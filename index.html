<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cardnuke · dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5fff8;
      --surface: #f0fdf5;
      --border:  #c4f0d8;
      --accent:  #34a853;
      --muted:   #70a088;
      --text:    #0d3a20;
      --ok:      #6dbf8a;
      --fail:    #e07070;
      --warn:    #e0b060;
      --code-bg: #e8f5ef;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #0d1a12;
        --surface: #152a1a;
        --border:  #306a40;
        --accent:  #a0f0c0;
        --muted:   #70a088;
        --text:    #d0f0e0;
        --ok:      #5aaf78;
        --fail:    #d06060;
        --warn:    #c09040;
        --code-bg: #1f3a25;
      }
    }

    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { padding: 2rem 1.5rem 1rem; max-width: 900px; margin: 0 auto; display: flex; align-items: baseline; gap: 1rem; }
    header h1 { font-size: 1.6rem; font-weight: 600; color: var(--accent); }
    header .sub { font-size: 0.8rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    #gen-time { margin-left: auto; font-size: 0.75rem; color: var(--muted); }

    main { max-width: 900px; margin: 0 auto; padding: 0 1.5rem 3rem; display: grid; gap: 1rem; }
    section { background: var(--surface); border: 0.5px solid var(--border); border-radius: 14px; padding: 1.2rem 1.4rem; }
    section h2 { font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }

    .stats { display: flex; flex-wrap: wrap; gap: 1rem; }
    .stat { flex: 1 1 140px; }
    .stat .val { font-size: 1.4rem; font-weight: 600; color: var(--accent); }
    .stat .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.5px; }
    .pill.ok   { background: color-mix(in srgb, var(--ok) 15%, transparent); color: var(--ok); }
    .pill.fail { background: color-mix(in srgb, var(--fail) 15%, transparent); color: var(--fail); }
    .pill.warn { background: color-mix(in srgb, var(--warn) 15%, transparent); color: var(--warn); }

    .check-list { display: flex; flex-direction: column; gap: 8px; }
    .check-row { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
    .check-row .icon { font-size: 1rem; width: 1.2rem; text-align: center; }
    .check-row .name { flex: 1; }
    .check-row .reason { font-size: 0.75rem; color: var(--muted); }
    .split { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .mini { border: 0.5px solid var(--border); border-radius: 10px; padding: 0.9rem 1rem; }
    .mini h3 { font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }
    .bullet-list { display: grid; gap: 6px; font-size: 0.84rem; }
    .bullet-list div { line-height: 1.4; }
    .link-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0.5rem; }
    .link-pill { border: 0.5px solid var(--border); background: var(--code-bg); color: var(--text); padding: 6px 10px; border-radius: 999px; font-size: 0.78rem; text-decoration: none; }
    .link-pill:hover { filter: brightness(0.97); }

    .guide { display: flex; flex-direction: column; gap: 1rem; }
    .guide-step { display: flex; gap: 12px; }
    .guide-step .num { width: 24px; height: 24px; border-radius: 50%; background: var(--border); color: var(--accent); font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .guide-step .body { flex: 1; }
    .guide-step .body p { font-size: 0.85rem; margin-bottom: 4px; }
    .note { font-size: 0.8rem; color: var(--muted); line-height: 1.4; margin-top: 0.5rem; }
    pre { background: var(--code-bg); border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 0.78rem; overflow-x: auto; color: var(--text); font-family: monospace; }
    code { font-family: monospace; }
  </style>
</head>
<body>
<header>
  <h1>cardnuke</h1>
  <span class="sub">media utility dashboard</span>
  <span id="gen-time"></span>
</header>
<main id="app"></main>

<script>
const now = new Date();
document.getElementById('gen-time').textContent = 'generated ' + now.toLocaleString();
const localMode = location.protocol === 'file:' ? 'local' : 'hosted';

const data = {
  stats: {
    scripts: 1,
    modes: 9,
    formatLevels: 4,
    platforms: 'Linux (+ Windows)',
    mode: localMode
  },
  checks: [
    { name: 'C++ build (cardnuke)', ok: true, reason: 'g++ compiled successfully' },
    { name: 'Speed test binary', ok: true, reason: 'O_DIRECT + fsync' },
    { name: 'Repo hygiene', ok: true, reason: 'Python deprecated' },
    { name: 'Risk profile', ok: false, reason: 'Destructive by design; verify device first' }
  ]
};

const app = document.getElementById('app');
app.innerHTML = `
  <section>
    <h2>📊 Project Stats</h2>
    <div class="stats">
      <div class="stat">
        <div class="val">${data.stats.scripts}</div>
        <div class="lbl">core scripts</div>
      </div>
      <div class="stat">
        <div class="val">${data.stats.modes}</div>
        <div class="lbl">main modes</div>
      </div>
      <div class="stat">
        <div class="val">${data.stats.formatLevels}</div>
        <div class="lbl">format levels</div>
      </div>
      <div class="stat">
        <div class="val" style="font-size:1rem">${data.stats.platforms}</div>
        <div class="lbl">platform support</div>
      </div>
      <div class="stat">
        <div class="val" style="font-size:1rem">${data.stats.mode}</div>
        <div class="lbl">local stat</div>
      </div>
    </div>
  </section>

  <section>
    <h2>🔗 Connected Web + Program</h2>
    <div class="bullet-list">
      <div>The web dashboard documents and links directly to the executable tooling files.</div>
      <div>Use this page for guidance, then run the same terminal workflow locally with root or administrator privileges.</div>
    </div>
    <div class="link-row">
      <a class="link-pill" href="https://github.com/Ivoryy06/cardnuke" target="_blank">GitHub repo</a>
      <a class="link-pill" href="./README.md" target="_blank">README</a>
      <a class="link-pill" href="./cardnuke" target="_blank">cardnuke (C++)</a>
    </div>
  </section>

  <section>
    <h2>⚡ C++ Implementation</h2>
    <div class="bullet-list">
      <div>- Written in C++ for maximum performance</div>
      <div>- Speed test uses O_DIRECT for true hardware speeds</div>
      <div>- 8MB sequential writes for SD card page alignment</div>
      <div>- fsync for hardware synchronization</div>
      <div>- Cache dropping via /proc/sys/vm/drop_caches</div>
      <div>- Monotonic clock for accurate timing</div>
    </div>
  </section>

  <section>
    <h2>🔧 Mode Status</h2>
    <div class="bullet-list">
      <div><b>Stable:</b> format, recover, health, info, eject</div>
      <div><b>Beta:</b> backup, restore, repair, speed</div>
    </div>
  </section>

  <section>
    <h2>⚖️ Pros + Cons</h2>
    <div class="split">
      <div class="mini">
        <h3>Pros</h3>
        <div class="bullet-list">
          <div>- Written in C++ for maximum performance</div>
          <div>- True hardware speed measurement</div>
          <div>- Interactive mode with confirmations</div>
          <div>- Works for repeated SD/USB maintenance</div>
        </div>
      </div>
      <div class="mini">
        <h3>Cons</h3>
        <div class="bullet-list">
          <div>- Destructive if wrong disk selected</div>
          <div>- Some features use external tools</div>
          <div>- Windows build requires MinGW</div>
          <div>- Always verify device first</div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2>🩺 Current Checks</h2>
    <div class="check-list">
      ${data.checks.map(c => `
        <div class="check-row">
          <span class="icon">${c.ok ? '✅' : '⚠️'}</span>
          <span class="name">${c.name}</span>
          <span class="pill ${c.ok ? 'ok' : 'warn'}">${c.ok ? 'ok' : 'careful'}</span>
          <span class="reason">${c.reason}</span>
        </div>
      `).join('')}
    </div>
  </section>

  <section>
    <h2>🐧 Linux Install</h2>
    <div class="guide">
      <div class="guide-step">
        <div class="num">1</div>
        <div class="body">
          <p>Clone the repository</p>
          <pre>git clone https://github.com/Ivoryy06/cardnuke.git ~/cardnuke</pre>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">2</div>
        <div class="body">
          <p>Install dependencies</p>
          <pre>sudo pacman -S gcc dosfstools exfatprogs e2fsprogs parted util-linux testdisk eject</pre>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">3</div>
        <div class="body">
          <p>Build the C++ binary</p>
          <pre>cd ~/cardnuke
make</pre>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">4</div>
        <div class="body">
          <p>Run as root</p>
          <pre>cd ~/cardnuke
sudo ./cardnuke</pre>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">5</div>
        <div class="body">
          <p>Or use command-line mode</p>
          <pre>sudo ./cardnuke /dev/sdb 5    # speed test</pre>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2>🪟 Windows Build</h2>
    <div class="guide">
      <div class="guide-step">
        <div class="num">1</div>
        <div class="body">
          <p>Install MinGW-w64 or use MSYS2</p>
          <pre>pacman -S mingw-w64-x86_64-gcc</pre>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">2</div>
        <div class="body">
          <p>Compile</p>
          <pre>g++ -O2 -std=c++17 -o cardnuke.exe cardnuke.cpp</pre>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">3</div>
        <div class="body">
          <p>Run as Administrator</p>
          <pre>.\cardnuke.exe</pre>
        </div>
      </div>
    </div>
  </section>
`;
</script>
</body>
</html>
