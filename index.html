<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cardnuke · dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f5fff8;
      --surface: #f0fdf5;
      --border:  #c4f0d8;
      --accent:  #34a853;
      --muted:   #70a088;
      --text:    #0d3a20;
      --ok:      #6dbf8a;
      --fail:    #e07070;
      --warn:    #e0b060;
      --code-bg: #e8f5ef;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:      #0d1a12;
        --surface: #152a1a;
        --border:  #306a40;
        --accent:  #a0f0c0;
        --muted:   #70a088;
        --text:    #d0f0e0;
        --ok:      #5aaf78;
        --fail:    #d06060;
        --warn:    #c09040;
        --code-bg: #1f3a25;
      }
    }

    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { padding: 2rem 1.5rem 1rem; max-width: 900px; margin: 0 auto; display: flex; align-items: baseline; gap: 1rem; }
    header h1 { font-size: 1.6rem; font-weight: 600; color: var(--accent); }
    header .sub { font-size: 0.8rem; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
    #gen-time { margin-left: auto; font-size: 0.75rem; color: var(--muted); }

    main { max-width: 900px; margin: 0 auto; padding: 0 1.5rem 3rem; display: grid; gap: 1rem; }
    section { background: var(--surface); border: 0.5px solid var(--border); border-radius: 14px; padding: 1.2rem 1.4rem; }
    section h2 { font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }

    .stats { display: flex; flex-wrap: wrap; gap: 1rem; }
    .stat { flex: 1 1 140px; }
    .stat .val { font-size: 1.4rem; font-weight: 600; color: var(--accent); }
    .stat .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

    .pill { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.5px; }
    .pill.ok   { background: color-mix(in srgb, var(--ok) 15%, transparent); color: var(--ok); }
    .pill.fail { background: color-mix(in srgb, var(--fail) 15%, transparent); color: var(--fail); }
    .pill.warn { background: color-mix(in srgb, var(--warn) 15%, transparent); color: var(--warn); }

    .check-list { display: flex; flex-direction: column; gap: 8px; }
    .check-row { display: flex; align-items: center; gap: 10px; font-size: 0.85rem; }
    .check-row .icon { font-size: 1rem; width: 1.2rem; text-align: center; }
    .check-row .name { flex: 1; }
    .check-row .reason { font-size: 0.75rem; color: var(--muted); }
    .split { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .mini { border: 0.5px solid var(--border); border-radius: 10px; padding: 0.9rem 1rem; }
    .mini h3 { font-size: 0.78rem; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }
    .bullet-list { display: grid; gap: 6px; font-size: 0.84rem; }
    .bullet-list div { line-height: 1.4; }
    .link-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 0.5rem; }
    .link-pill { border: 0.5px solid var(--border); background: var(--code-bg); color: var(--text); padding: 6px 10px; border-radius: 999px; font-size: 0.78rem; text-decoration: none; }
    .link-pill:hover { filter: brightness(0.97); }

    .guide { display: flex; flex-direction: column; gap: 1rem; }
    .guide-step { display: flex; gap: 12px; }
    .guide-step .num { width: 24px; height: 24px; border-radius: 50%; background: var(--border); color: var(--accent); font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
    .guide-step .body { flex: 1; }
    .guide-step .body p { font-size: 0.85rem; margin-bottom: 4px; }
    .note { font-size: 0.8rem; color: var(--muted); line-height: 1.4; margin-top: 0.5rem; }
    .note a { color: var(--accent); text-decoration: underline; }
    pre { background: var(--code-bg); border-radius: 8px; padding: 0.6rem 0.9rem; font-size: 0.78rem; overflow-x: auto; color: var(--text); font-family: monospace; }
    code { font-family: monospace; background: var(--code-bg); padding: 2px 5px; border-radius: 4px; font-size: 0.85em; }
  </style>
</head>
<body>
<header>
  <h1>cardnuke</h1>
  <span class="sub">media utility dashboard</span>
  <span id="gen-time"></span>
</header>
<main id="app"></main>

<script>
const now = new Date();
document.getElementById('gen-time').textContent = 'generated ' + now.toLocaleString();
const localMode = location.protocol === 'file:' ? 'local' : 'hosted';

const data = {
  stats: {
    programs: 2,
    modes: 9,
    formatLevels: 4,
    platforms: 'Linux + Windows',
    mode: localMode
  },
  checks: [
    { name: 'C++ build (cardnuke)', ok: true, reason: 'g++ compiled successfully' },
    { name: 'Windows build (cardnuke_win)', ok: true, reason: 'Ready to compile on Windows' },
    { name: 'Repo hygiene', ok: true, reason: 'Python deprecated' },
    { name: 'Risk profile', ok: false, reason: 'Destructive by design; verify device first' }
  ]
};

const app = document.getElementById('app');
app.innerHTML = `
  <section>
    <h2>📊 Project Stats</h2>
    <div class="stats">
      <div class="stat">
        <div class="val">${data.stats.programs}</div>
        <div class="lbl">programs</div>
      </div>
      <div class="stat">
        <div class="val">${data.stats.modes}</div>
        <div class="lbl">main modes</div>
      </div>
      <div class="stat">
        <div class="val">${data.stats.formatLevels}</div>
        <div class="lbl">format levels</div>
      </div>
      <div class="stat">
        <div class="val" style="font-size:1rem">${data.stats.platforms}</div>
        <div class="lbl">platform support</div>
      </div>
      <div class="stat">
        <div class="val" style="font-size:1rem">${data.stats.mode}</div>
        <div class="lbl">local stat</div>
      </div>
    </div>
  </section>

  <section>
    <h2>🔗 Connected Web + Program</h2>
    <div class="bullet-list">
      <div>The web dashboard documents and links directly to the executable tooling files.</div>
      <div>Use this page for guidance, then run the same terminal workflow locally with root (Linux) or Administrator (Windows) privileges.</div>
    </div>
    <div class="link-row">
      <a class="link-pill" href="https://github.com/Ivoryy06/cardnuke" target="_blank">GitHub</a>
      <a class="link-pill" href="./README.md" target="_blank">README</a>
      <a class="link-pill" href="./cardnuke" target="_blank">cardnuke (Linux)</a>
      <a class="link-pill" href="./cardnuke_win.cpp" target="_blank">cardnuke_win (Windows)</a>
      <a class="link-pill" href="#contact">Contact</a>
    </div>
  </section>

  <section>
    <h2>⚡ C++ Implementation</h2>
    <div class="bullet-list">
      <div>- Written in C++ for maximum performance</div>
      <div>- Two separate programs: Linux (cardnuke) and Windows (cardnuke_win.exe)</div>
      <div>- Uses native APIs: Linux uses libmount/posix, Windows uses WinAPI</div>
      <div>- No external dependencies on Windows</div>
      <div>- Speed test uses O_DIRECT for true hardware speeds</div>
      <div>- 8MB sequential writes for SD card page alignment</div>
    </div>
  </section>

  <section>
    <h2>🔧 Mode Status</h2>
    <div class="bullet-list">
      <div><b>Stable:</b> format, recover, health, info, eject</div>
      <div><b>Beta:</b> backup, restore, repair, speed</div>
    </div>
  </section>

  <section>
    <h2>⚖️ Pros + Cons</h2>
    <div class="split">
      <div class="mini">
        <h3>Pros</h3>
        <div class="bullet-list">
          <div>- Written in C++ for maximum performance</div>
          <div>- True hardware speed measurement</div>
          <div>- Interactive mode with confirmations</div>
          <div>- No dependencies on Windows</div>
          <div>- Works for repeated SD/USB maintenance</div>
        </div>
      </div>
      <div class="mini">
        <h3>Cons</h3>
        <div class="bullet-list">
          <div>- Destructive if wrong disk selected</div>
          <div>- Some Linux features use external tools</div>
          <div>- Windows build requires MinGW-w64</div>
          <div>- Always verify device first</div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2>🩺 Current Checks</h2>
    <div class="check-list">
      ${data.checks.map(c => `
        <div class="check-row">
          <span class="icon">${c.ok ? '✅' : '⚠️'}</span>
          <span class="name">${c.name}</span>
          <span class="pill ${c.ok ? 'ok' : 'warn'}">${c.ok ? 'ok' : 'careful'}</span>
          <span class="reason">${c.reason}</span>
        </div>
      `).join('')}
    </div>
  </section>

  <section>
    <h2>📦 Requirements</h2>
    <div class="split">
      <div class="mini">
        <h3>Linux Build</h3>
        <div class="bullet-list">
          <div><b>Build:</b> g++ with C++17</div>
          <div><b>Runtime:</b> parted, dd, mkfs.*, fsck, badblocks, eject</div>
          <div><b>Access:</b> sudo (root)</div>
        </div>
      </div>
      <div class="mini">
        <h3>Windows Build</h3>
        <div class="bullet-list">
          <div><b>Build:</b> MinGW-w64 with C++17</div>
          <div><b>Runtime:</b> None (uses WinAPI)</div>
          <div><b>Access:</b> Administrator</div>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2>🐧 Linux Install</h2>
    <div class="guide">
      <div class="guide-step">
        <div class="num">1</div>
        <div class="body">
          <p>Clone the repository</p>
          <pre>git clone https://github.com/Ivoryy06/cardnuke.git ~/cardnuke</pre>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">2</div>
        <div class="body">
          <p>Install dependencies</p>
          <pre>sudo pacman -S gcc dosfstools exfatprogs e2fsprogs parted util-linux testdisk eject</pre>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">3</div>
        <div class="body">
          <p>Build the C++ binary</p>
          <pre>cd ~/cardnuke
make linux</pre>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">4</div>
        <div class="body">
          <p>Run as root</p>
          <pre>cd ~/cardnuke
sudo ./cardnuke</pre>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">5</div>
        <div class="body">
          <p>Or use command-line mode</p>
          <pre>sudo ./cardnuke /dev/sdb 5    # speed test</pre>
        </div>
      </div>
    </div>
  </section>

  <section>
    <h2>🪟 Windows Tutorial</h2>
    <div class="guide">
      <div class="guide-step">
        <div class="num">1</div>
        <div class="body">
          <p>Download the source file</p>
          <p class="note">Get <code>cardnuke_win.cpp</code> from the repository (or copy it from the folder if you have it)</p>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">2</div>
        <div class="body">
          <p>Install MinGW-w64 compiler</p>
          <p class="note">Download MSYS2 from <a href="https://www.msys2.org" target="_blank" style="color: var(--accent)">msys2.org</a>, then run in MSYS2 terminal:</p>
          <pre>pacman -S mingw-w64-x86_64-gcc</pre>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">3</div>
        <div class="body">
          <p>Compile the program</p>
          <p class="note">Open "MinGW Win64" from your Start Menu (or use MSYS2 terminal), then:</p>
          <pre>g++ -O2 -Wall -std=c++17 -o cardnuke_win.exe cardnuke_win.cpp -lws2_32 -lsetupapi</pre>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">4</div>
        <div class="body">
          <p>Run as Administrator</p>
          <p class="note">Right-click Command Prompt → Run as Administrator, or press <code>Win+X</code> → Terminal (Admin)</p>
        </div>
      </div>
      <div class="guide-step">
        <div class="num">5</div>
        <div class="body">
          <p>Use the program</p>
          <p class="note">Navigate to where you saved <code>cardnuke_win.exe</code> and run:</p>
          <pre>cd Downloads\cardnuke

cardnuke_win.exe --list           List all drives
cardnuke_win.exe D 1             Format drive D: (NTFS)
cardnuke_win.exe D 1 exfat mycard  Format drive D: as exFAT with label "mycard"
cardnuke_win.exe D 2 backup.img   Backup D: to backup.img file
cardnuke_win.exe D 4              Speed test drive D:</pre>
        </div>
      </div>
    </div>
    <div class="note">
      <b>Important:</b> Always run as Administrator. The drive letter is just the letter (D, E, F) without colon.
    </div>
  </section>

  <section>
    <h2>❓ FAQ</h2>
    <div class="bullet-list">
      <div><b>"Access denied" error?</b><br>Run CMD as Administrator (right-click → Run as administrator)</div>
      <div><b>"Cannot open drive"?</b><br>Make sure the drive is not in use. Close any open files/folders on that drive.</div>
      <div><b>Format not working?</b><br>Try closing all programs that might be using the drive, then try again.</div>
      <div><b>Backup is slow?</b><br>Normal for USB 2.0 or slow cards. USB 3.0 should be 50-200 MB/s.</div>
      <div><b>What filesystem to use?</b><br>NTFS for large files (64GB+), FAT32 for compatibility, exFAT for modern cards.</div>
    </div>
  </section>

  <section id="contact">
    <h2>📬 Contact</h2>
    <div class="bullet-list">
      <div><b>Instagram:</b> @kizunee.cr3</div>
      <div><b>Discord:</b> @kiz.une</div>
    </div>
  </section>
`;
</script>
</body>
</html>
